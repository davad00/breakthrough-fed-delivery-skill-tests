<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis | Luxury Meditation Retreat</title>
    <style>
        :root {
            --bg-dark: #0a1411;
            --accent-gold: #c5a059;
            --text-light: #e0e6e3;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cinzel', serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }
        .wrapper {
            position: relative;
            min-height: 100vh;
            background-image: linear-gradient(rgba(10, 20, 17, 0.7), rgba(10, 20, 17, 0.8)), url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 2.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 2rem;
            color: var(--accent-gold);
            letter-spacing: 5px;
        }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
        }
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }
        h1 {
            font-size: 6rem;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 2rem;
            max-width: 800px;
        }
        h1 span {
            color: var(--accent-gold);
            font-style: italic;
        }
        .description {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            line-height: 2;
            max-width: 400px;
            margin-bottom: 4rem;
            color: #a0aba5;
        }
        .explore-link {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            color: var(--accent-gold);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: gap 0.3s ease;
        }
        .explore-link:hover {
            gap: 1.5rem;
        }
        .explore-link::after {
            content: '→';
            font-size: 1.2rem;
        }
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap');
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">OASIS</div>
            <button class="menu-btn">Menu</button>
        </header>
        <main class="hero">
            <h1>Awaken Your <span>Inner</span> Peace</h1>
            <p class="description">An exclusive sanctuary hidden in nature. Experience profound silence and bespoke meditation programs designed for the elite soul.</p>
            <a href="#" class="explore-link">Discover the Retreat</a>
        </main>
    </div>
</body>
</html>
